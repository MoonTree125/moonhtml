<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>不滅神劍：班級金融與天賦資料片</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background: #0a0e17; color: #fff; font-family: sans-serif; padding: 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 50px; }
        
        .stat-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 2px solid #38bdf8; border-radius: 16px; padding: 15px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.4); position: relative; }
        .admin-trigger-btn { background: transparent; border: none; color: #38bdf8; font-size: 14px; letter-spacing: 2px; cursor: pointer; width: 100%; padding: 5px 0; font-weight: bold; outline: none; }
        .coin-count { font-size: 36px; font-weight: bold; color: #fff; margin: 5px 0; text-shadow: 0 0 12px #38bdf8; font-family: monospace; }
        .weapon-info { font-size: 14px; color: #cbd5e1; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; display: inline-block; margin-top: 5px; }
        .title-display { font-size: 13px; font-weight: bold; margin-top: 4px; letter-spacing: 1px; }
        
        .event-banner { display: none; background: linear-gradient(90deg, #ef4444, #f59e0b); color: #fff; font-weight: bold; padding: 8px; border-radius: 8px; text-align: center; font-size: 14px; animation: pulse 1s infinite; margin-top: 5px; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .click-area { background: radial-gradient(circle, #1e293b 0%, #090d16 100%); border-radius: 24px; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 200px; border: 1px solid #334155; position: relative; overflow: hidden; }
        .svg-sword-container { width: 120px; height: 120px; cursor: pointer; transition: transform 0.05s ease; filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.7)); }
        .svg-sword-container:active { transform: scale(0.88) rotate(-8deg); }
        
        .panel { background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 15px; }
        .panel-title { font-size: 14px; color: #9ca3af; font-weight: 600; margin-bottom: 12px; display: flex; justify-content: space-between; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        
        button { background: #1f2937; border: none; color: #fff; padding: 10px 6px; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border-bottom: 4px solid rgba(0,0,0,0.3); width: 100%; }
        button:active { transform: translateY(2px); border-bottom-width: 2px; }
        button:disabled { opacity: 0.25; cursor: not-allowed; transform: none; border-bottom-width: 4px; }
        
        .btn-upgrade { background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); }
        .btn-enchant { background: linear-gradient(135deg, #a21caf 0%, #86198f 100%); }
        .btn-miner { background: linear-gradient(135deg, #d97706 0%, #b45309 100%); }
        .btn-wheel { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
        .sm-btn { padding: 8px 12px; font-size: 12px; width: auto; background: #10b981; border-bottom: 2px solid rgba(0,0,0,0.3); }
        
        .desc { font-size: 10px; color: #9ca3af; font-weight: normal; }
        .input-group { display: flex; gap: 8px; margin-top: 8px; }
        input { flex: 1; background: #030712; border: 1px solid #374151; border-radius: 8px; padding: 8px; color: #fff; font-size: 12px; text-align: center; outline: none; }
        
        /* 股市與天賦樣式 */
        .stock-row { background: #030712; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #1f2937; }
        .stock-info { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
        .talent-box { max-height: 220px; overflow-y: auto; background: #030712; padding: 10px; border-radius: 10px; border: 1px solid #334155; display: flex; flex-direction: column; gap: 6px; }
        .talent-item { background: #1e293b; padding: 8px; border-radius: 8px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #64748b; }
        .talent-item.unlocked { border-left-color: #10b981; background: #064e3b; }
        .talent-item.locked { opacity: 0.5; }
        .talent-btn { width: auto; padding: 4px 8px; font-size: 11px; background: #2563eb; border-bottom: 2px solid rgba(0,0,0,0.2); }
        
        .admin-panel { display: none; background: linear-gradient(135deg, #450a0a 0%, #111827 100%); border: 2px dashed #ef4444; }
        .floating-num { position: absolute; font-weight: bold; font-size: 20px; color: #38bdf8; pointer-events: none; animation: floatUp 0.6s ease-out forwards; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-family: monospace; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }
    </style>
</head>
<body>

<div class="container">
    <div class="stat-card">
        <button class="admin-trigger-btn" id="secret-btn">GOLDEN COINS</button>
        <div class="coin-count" id="score-display">0</div>
        <div class="weapon-info" id="weapon-display">🗡️ 載入中...</div>
        <div class="title-display" id="title-display">👑 稱號：無名小卒</div>
        <div style="font-size: 11px; color: #a78bfa; margin-top: 4px;" id="enchant-display">✨ 附魔：無</div>
        <div class="event-banner" id="event-banner">🔥 雙倍狂暴時刻！！收益 x2 (8s) 🔥</div>
    </div>

    <div class="panel admin-panel" id="admin-zone">
        <div class="panel-title" style="color: #f87171;">🔱 創世神控制台</div>
        <div style="margin-bottom: 10px;">
            <div class="input-group">
                <input type="number" id="adm-w-input" placeholder="強行裝備武器等級 (1-50)">
                <button class="sm-btn" id="adm-w-btn" style="background: #ef4444;">裝備</button>
            </div>
        </div>
        <div style="margin-bottom: 10px;" class="grid-2">
            <input type="number" id="adm-coin-input" placeholder="設定金幣數">
            <input type="number" id="adm-miner-input" placeholder="設定礦工數">
        </div>
        <button id="adm-save-btn" style="background: #b91c1c; margin-bottom: 10px;">💾 應用修改</button>
        <div class="grid-2">
            <input type="number" id="diy-w" placeholder="自訂Lv(1-50)">
            <input type="number" id="diy-e" placeholder="自訂附魔(0-51)">
        </div>
        <button id="diy-code-btn" style="background: #4d7c0f; margin-top: 4px;">⚙️ 憑空生成武器交易碼</button>
    </div>

    <div class="panel">
        <div class="panel-title"><span>📈 班級武器素材交易所 (每10秒波動)</span><span style="color:#10b981;" id="stock-timer">10s</span></div>
        
        <div class="stock-row">
            <div class="stock-info">
                <span style="color:#cbd5e1; font-weight:bold;">🔩 精鋼原材料 (STEL)</span>
                <span>擁有: <b id="st-own-0" style="color:#38bdf8;">0</b> | 市價: <b id="st-price-0" style="color:#f59e0b;">10</b></span>
            </div>
            <div class="grid-4" style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:5px;">
                <button onclick="buyStock(0,1)">買1</button>
                <button onclick="sellStock(0,1)">賣1</button>
                <button onclick="buyStock(0,'all')" style="background:#065f46;">全倉買</button>
                <button onclick="sellStock(0,'all')" style="background:#991b1b;">全倉賣</button>
            </div>
        </div>
        <div class="stock-row">
            <div class="stock-info">
                <span style="color:#f43f5e; font-weight:bold;">🔥 烈焰寶石 (FIRE)</span>
                <span>擁有: <b id="st-own-1" style="color:#38bdf8;">0</b> | 市價: <b id="st-price-1" style="color:#f59e0b;">150</b></span>
            </div>
            <div class="grid-4" style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:5px;">
                <button onclick="buyStock(1,1)">買1</button>
                <button onclick="sellStock(1,1)">賣1</button>
                <button onclick="buyStock(1,'all')" style="background:#065f46;">全倉買</button>
                <button onclick="sellStock(1,'all')" style="background:#991b1b;">全倉賣</button>
            </div>
        </div>
        <div class="stock-row">
            <div class="stock-info">
                <span style="color:#a855f7; font-weight:bold;">🌌 宇宙以太 (ETHR)</span>
                <span>擁有: <b id="st-own-2" style="color:#38bdf8;">0</b> | 市價: <b id="st-price-2" style="color:#f59e0b;">2000</b></span>
            </div>
            <div class="grid-4" style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:5px;">
                <button onclick="buyStock(2,1)">買1</button>
                <button onclick="sellStock(2,1)">賣1</button>
                <button onclick="buyStock(2,'all')" style="background:#065f46;">全倉買</button>
                <button onclick="sellStock(2,'all')" style="background:#991b1b;">全倉賣</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">🌳 創世神天賦樹 (已解鎖: <span id="talent-count">0</span>/50)</div>
        <div class="talent-box" id="talent-container">
            </div>
    </div>

    <div class="click-area" id="click-zone">
        <div class="svg-sword-container" id="click-btn">
            <svg viewBox="0 0 100 100" width="100%" height="100%" style="transform: rotate(45deg);">
                <path d="M 45 8 C 45 8, 50 0, 55 8 L 55 65 L 45 65 Z" fill="#e2e8f0" />
                <path d="M 25 65 C 35 60, 65 60, 75 65 L 70 72 L 30 72 Z" fill="#eab308" />
                <rect x="44" y="72" width="12" height="20" rx="3" fill="#292524" />
                <circle cx="50" cy="95" r="2" fill="#67e8f9" />
            </svg>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">⚙️ 武器鍛造、附魔與祭壇</div>
        <div class="grid-2">
            <button class="btn-upgrade" id="upgrade-btn"><span>⚒️ 手動升級武器</span><span class="desc" id="upgrade-desc">花費 60</span></button>
            <button class="btn-enchant" id="enchant-btn"><span>🔥 隨機附魔</span><span class="desc" id="enchant-desc">花費 100</span></button>
            <button class="btn-miner" id="miner-btn"><span>⛏️ 僱用礦工</span><span class="desc" id="miner-desc">花費 75</span></button>
            <button class="btn-wheel" id="wheel-btn"><span>🎰 幸運大轉盤</span><span class="desc">花費 500</span></button>
        </div>
        <button id="demon-btn" style="background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%); margin-top:10px; border: 1px solid #ef4444;">
            💀 與惡魔簽訂契約 (花費當前30%金幣)
            <span class="desc" style="color:#fca5a5;">50%機率武器飆升5級，50%機率直接碎裂歸零！</span>
        </button>
    </div>

    <div class="panel">
        <div class="panel-title">🏪 班級武器一對一交易市場</div>
        <button style="background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);" id="pack-btn">📦 打包目前的武器為「交易碼」</button>
        <div class="input-group">
            <input type="text" id="market-input" placeholder="貼上同學給你的武器交易碼">
            <button class="sm-btn" id="unpack-btn">解包引入</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">🎁 官方新手福利代碼</div>
        <div class="input-group">
            <input type="text" id="gift-input" placeholder="輸入官方福利碼">
            <button class="sm-btn" id="gift-btn" style="background:#06b6d4;">領取</button>
        </div>
    </div>
</div>

<script>
    // 儲存金鑰定義
    const KEY_SCORE = 'v7_save_score';
    const KEY_W_IDX = 'v7_save_w_idx';
    const KEY_E_ID  = 'v7_save_e_id';
    const KEY_MINER = 'v7_save_miners';
    const KEY_GIFTS = 'v7_save_gifts';
    const KEY_STOCKS = 'v7_save_stocks';
    const KEY_TALENTS = 'v7_save_talents';

    // 完美吸取並繼承一千六百萬或八千萬舊進度
    if (!localStorage.getItem(KEY_SCORE) && localStorage.getItem('v6_save_score')) {
        localStorage.setItem(KEY_SCORE, localStorage.getItem('v6_save_score'));
        localStorage.setItem(KEY_W_IDX, localStorage.getItem('v6_save_w_idx'));
        localStorage.setItem(KEY_E_ID, localStorage.getItem('v6_save_e_id'));
        localStorage.setItem(KEY_MINER, localStorage.getItem('v6_save_miners'));
    } else if (!localStorage.getItem(KEY_SCORE) && localStorage.getItem('all_score')) {
        localStorage.setItem(KEY_SCORE, localStorage.getItem('all_score'));
        localStorage.setItem(KEY_W_IDX, localStorage.getItem('all_w_idx') || 1);
        localStorage.setItem(KEY_E_ID, localStorage.getItem('all_e_id') || 0);
        localStorage.setItem(KEY_MINER, localStorage.getItem('all_miners') || 0);
    }

    // 變數初始化
    let score = parseInt(localStorage.getItem(KEY_SCORE)) || 0;
    let weaponIndex = parseInt(localStorage.getItem(KEY_W_IDX)) || 1;
    let enchantId = parseInt(localStorage.getItem(KEY_E_ID)) || 0;
    let miners = parseInt(localStorage.getItem(KEY_MINER)) || 0;
    let usedGiftCodes = JSON.parse(localStorage.getItem(KEY_GIFTS)) || [];
    let stockOwned = JSON.parse(localStorage.getItem(KEY_STOCKS)) || [0, 0, 0];
    let unlockedTalents = JSON.parse(localStorage.getItem(KEY_TALENTS)) || [];

    // 股市資料組：基礎價、當前價
    const stockBasePrices = [10, 150, 2000];
    let stockPrices = [10, 150, 2000];
    let stockCountdown = 10;

    // 狂暴隨機事件變數
    let isRageMode = false;

    // 50把武器庫
    const weapons = [];
    const prefix = ["新手", "精鋼", "淬火", "黑曜石", "寒冰", "烈焰", "雷霆", "破空", "聖光", "不滅"];
    const wTypes = ["鐵劍", "長劍", "巨劍", "重劍", "太刀", "戰刃", "靈劍", "神劍"];
    for(let i=1; i<=50; i++) {
        if(i === 1) weapons.push({name: "破舊鐵劍", power: 1});
        else if(i === 50) weapons.push({name: "🌌 宇宙終極不滅真神創世劍", power: 150000});
        else {
            let p = prefix[Math.floor((i/50)*prefix.length)];
            let t = wTypes[Math.floor((i/80)*wTypes.length)];
            weapons.push({name: `${p}之${t} Lv.${i}`, power: Math.floor(Math.pow(i, 2.8) + i * 5)});
        }
    }

    // 52種附魔庫
    const enchants = [{name: "無", multiply: 1.0, color: "#fff"}];
    while(enchants.length < 51) {
        let id = enchants.length;
        enchants.push({ name: `神聖超頻 Tier ${id}`, multiply: 500 + (id * 150), color: "#c084fc" });
    }
    enchants.push({name: "🌈 全班我最帥", multiply: 100.0, color: "#f472b6"});

    // 50項天賦樹資料生成（一環扣一環，必須依序解鎖）
    const talentsData = [];
    // 1-10 點擊流
    for(let i=1; i<=10; i++) talentsData.push({id: i, name: `💥 點擊狂熱 Lv.${i}`, cost: i*150, desc: `手動點擊金幣收益 +${i*30}%`});
    // 11-20 掛機流
    for(let i=11; i<=20; i++) talentsData.push({id: i, name: `⛏️ 自動化調教 Lv.${i-10}`, cost: (i-10)*200, desc: `礦工每秒工作收益額外 +${(i-10)*2}`});
    // 21-30 股市流
    for(let i=21; i<=30; i++) talentsData.push({id: i, name: `📈 韭菜翻身術 Lv.${i-20}`, cost: (i-20)*500, desc: `股票市場基礎暴漲機率提高`});
    // 31-40 轉盤流
    for(let i=31; i<=40; i++) talentsData.push({id: i, name: `🎰 氣運全開 Lv.${i-30}`, cost: (i-30)*600, desc: `幸運大轉盤花費降低 5%`});
    // 41-50 契約流
    for(let i=41; i<=50; i++) talentsData.push({id: i, name: `😈 惡魔交易執照 Lv.${i-40}`, cost: (i-40)*1500, desc: `惡魔契約成功機率提高 2.5%`});

    // 綁定 DOM 元素
    const scoreDisplay = document.getElementById('score-display');
    const weaponDisplay = document.getElementById('weapon-display');
    const enchantDisplay = document.getElementById('enchant-display');
    const titleDisplay = document.getElementById('title-display');
    const eventBanner = document.getElementById('event-banner');
    const clickBtn = document.getElementById('click-btn');
    const upgradeBtn = document.getElementById('upgrade-btn');
    const upgradeDesc = document.getElementById('upgrade-desc');
    const enchantBtn = document.getElementById('enchant-btn');
    const enchantDesc = document.getElementById('enchant-desc');
    const minerBtn = document.getElementById('miner-btn');
    const minerDesc = document.getElementById('miner-desc');
    const wheelBtn = document.getElementById('wheel-btn');
    const demonBtn = document.getElementById('demon-btn');
    const packBtn = document.getElementById('pack-btn');
    const marketInput = document.getElementById('market-input');
    const unpackBtn = document.getElementById('unpack-btn');
    const giftInput = document.getElementById('gift-input');
    const giftBtn = document.getElementById('gift-btn');

    // 管理員 DOM
    const secretBtn = document.getElementById('secret-btn');
    const adminZone = document.getElementById('admin-zone');
    const admWInput = document.getElementById('adm-w-input');
    const admWBtn = document.getElementById('adm-w-btn');
    const admCoinInput = document.getElementById('adm-coin-input');
    const admMinerInput = document.getElementById('adm-miner-input');
    const admSaveBtn = document.getElementById('adm-save-btn');
    const diyW = document.getElementById('diy-w');
    const diyE = document.getElementById('diy-e');
    const diyCodeBtn = document.getElementById('diy-code-btn');

    // 🔒 管理員密碼鎖（連點10下）
    let secretClicks = 0;
    secretBtn.addEventListener('click', () => {
        secretClicks++;
        if(secretClicks >= 10) {
            secretClicks = 0;
            let pwd = prompt("請輸入創世神後台指令碼：");
            if(pwd === "@denny4096") {
                adminZone.style.display = "block";
                admCoinInput.value = score;
                admMinerInput.value = miners;
            }
        }
    });

    // 稱號判定邏輯
    function getTitle(coins) {
        if (adminZone.style.display === "block") return { text: "🔱 班級不滅創世神", color: "#f87171" };
        if (coins >= 500000000) return { text: "👑 宇宙終極不滅真神", color: "#fbbf24" };
        if (coins >= 50000000) return { text: "🟣 班級傳奇股神", color: "#c084fc" };
        if (coins >= 5000000) return { text: "🔵 全民市場富豪", color: "#60a5fa" };
        if (coins >= 100000) return { text: "🟢 班級打工人", color: "#34d399" };
        return { text: "⚪ 平民小卒", color: "#9ca3af" };
    }

    // 計算天賦加成
    function getTalentBonusClick() {
        let count = unlockedTalents.filter(id => id >= 1 && id <= 10).length;
        return 1 + (count * 0.3);
    }
    function getTalentBonusMiner() {
        let count = unlockedTalents.filter(id => id >= 11 && id <= 20).length;
        return count * 2;
    }
    function getTalentStockLuck() {
        return unlockedTalents.filter(id => id >= 21 && id <= 30).length * 0.04;
    }
    function getTalentWheelDiscount() {
        return unlockedTalents.filter(id => id >= 31 && id <= 40).length * 0.05;
    }
    function getTalentDemonBonus() {
        return unlockedTalents.filter(id => id >= 41 && id <= 50).length * 0.025;
    }

    // 初始化與更新 UI
    function updateUI() {
        scoreDisplay.innerText = Math.floor(score).toLocaleString();
        weaponDisplay.innerText = `🗡️ 裝備：${weapons[weaponIndex - 1].name}`;
        
        let enc = enchants[enchantId];
        enchantDisplay.innerText = `✨ 附魔：${enc.name} (倍率: x${enc.multiply})`;
        enchantDisplay.style.color = enc.color;

        // 稱號更新
        let titleObj = getTitle(score);
        titleDisplay.innerText = `👑 稱號：${titleObj.text}`;
        titleDisplay.style.color = titleObj.color;

        // 按鈕花費計算（含天賦減免）
        let upCost = weaponIndex * 60;
        if (weaponIndex < 50) {
            upgradeDesc.innerText = `花費 ${upCost}`;
            upgradeBtn.disabled = (score < upCost);
        } else {
            upgradeBtn.innerHTML = "<span>⚡ 滿級 50 ⚡</span>";
            upgradeBtn.disabled = true;
        }

        let encCost = weaponIndex * 100;
        enchantDesc.innerText = `花費 ${encCost}`;
        enchantBtn.disabled = (score < encCost);

        let minCost = 75 + (miners * 45);
        minerDesc.innerText = `擁有: ${miners} | 花費 ${minCost}`;
        minerBtn.disabled = (score < minCost);

        let wCost = Math.floor(500 * (1 - getTalentWheelDiscount()));
        wheelBtn.querySelector('.desc').innerText = `花費 ${wCost}`;
        wheelBtn.disabled = (score < wCost);

        // 更新股市介面
        for(let i=0; i<3; i++) {
            document.getElementById(`st-own-${i}`).innerText = stockOwned[i];
            document.getElementById(`st-price-${i}`).innerText = Math.floor(stockPrices[i]).toLocaleString();
        }

        // 更新天賦樹解鎖總數
        document.getElementById('talent-count').innerText = unlockedTalents.length;

        // 寫入本地存檔
        localStorage.setItem(KEY_SCORE, score);
        localStorage.setItem(KEY_W_IDX, weaponIndex);
        localStorage.setItem(KEY_E_ID, enchantId);
        localStorage.setItem(KEY_MINER, miners);
        localStorage.setItem(KEY_GIFTS, JSON.stringify(usedGiftCodes));
        localStorage.setItem(KEY_STOCKS, JSON.stringify(stockOwned));
        localStorage.setItem(KEY_TALENTS, JSON.stringify(unlockedTalents));
    }

    // 核心點擊處理
    function handleCoreClick(clientX, clientY) {
        let basePower = weapons[weaponIndex - 1].power;
        let encMult = enchants[enchantId].multiply;
        let talentMult = getTalentBonusClick();
        let eventMult = isRageMode ? 2 : 1;

        let totalPower = Math.floor(basePower * encMult * talentMult * eventMult);
        score += totalPower;

        let num = document.createElement('div');
        num.className = 'floating-num';
        num.innerText = `+${totalPower}`;
        if(isRageMode) { num.style.color = '#f59e0b'; num.style.fontSize = '26px'; }
        num.style.left = `${clientX - 20}px`;
        num.style.top = `${clientY - 40}px`;
        document.body.appendChild(num);
        setTimeout(() => num.remove(), 600);

        updateUI();
    }

    clickBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleCoreClick(e.touches[0].clientX, e.touches[0].clientY); });
    clickBtn.addEventListener('click', (e) => { if (e.pointerType === 'touch') return; handleCoreClick(e.clientX, e.clientY); });

    // 升級、附魔、礦工購買
    upgradeBtn.addEventListener('click', () => {
        let cost = weaponIndex * 60;
        if (score >= cost && weaponIndex < 50) { score -= cost; weaponIndex++; updateUI(); }
    });
    enchantBtn.addEventListener('click', () => {
        let cost = weaponIndex * 100;
        if (score >= cost) { score -= cost; enchantId = Math.floor(Math.random() * 50) + 1; updateUI(); }
    });
    minerBtn.addEventListener('click', () => {
        let cost = 75 + (miners * 45);
        if (score >= cost) { score -= cost; miners++; updateUI(); }
    });

    // 礦工掛機產出每秒執行一次
    setInterval(() => {
        if (miners > 0) {
            let minerPower = miners + getTalentBonusMiner();
            score += minerPower;
            updateUI();
        }
    }, 1000);

    // 大轉盤
    wheelBtn.addEventListener('click', () => {
        let wCost = Math.floor(500 * (1 - getTalentWheelDiscount()));
        if (score >= wCost) {
            score -= wCost;
            let rng = Math.random();
            if (rng <= 0.01) { enchantId = 51; } 
            else if (rng <= 0.20) { weaponIndex = Math.min(50, weaponIndex + 3); } 
            else { score += 1000; }
            updateUI();
        }
    });

    // 😈 惡魔契約邏輯
    demonBtn.addEventListener('click', () => {
        if(score <= 0) return;
        let sacrifice = Math.floor(score * 0.3);
        score -= sacrifice;

        let successRate = 0.50 + getTalentDemonBonus();
        if(Math.random() <= successRate) {
            weaponIndex = Math.min(50, weaponIndex + 5);
            alert(`😈 契約成功！惡魔的力量注入，武器連升 5 級！(失去了 ${sacrifice.toLocaleString()} 金幣)`);
        } else {
            weaponIndex = 1;
            alert(`💀 契約失敗！惡魔狂笑著折斷了你的武器，武器當場碎裂變回 Lv.1 破舊鐵劍！`);
        }
        updateUI();
    });

    // 📈 股票買賣交易系統邏輯
    window.buyStock = function(id, amt) {
        let price = Math.floor(stockPrices[id]);
        if(amt === 'all') {
            let maxBuy = Math.floor(score / price);
            if(maxBuy > 0) { score -= maxBuy * price; stockOwned[id] += maxBuy; }
        } else {
            if(score >= price) { score -= price; stockOwned[id] += amt; }
        }
        updateUI();
    };

    window.sellStock = function(id, amt) {
        let price = Math.floor(stockPrices[id]);
        if(amt === 'all') {
            if(stockOwned[id] > 0) { score += stockOwned[id] * price; stockOwned[id] = 0; }
        } else {
            if(stockOwned[id] >= amt) { stockOwned[id] -= amt; score += price; }
        }
        updateUI();
    };

    // 股市價格 10秒波動計時器
    setInterval(() => {
        stockCountdown--;
        if(stockCountdown <= 0) {
            stockCountdown = 10;
            // 計算波動幅度，融入天賦加成
            let talentLuck = getTalentStockLuck();
            for(let i=0; i<3; i++) {
                let changePercent = (Math.random() * 2.2 - 1.0) + talentLuck; // 隨機跌100% ~ 漲120%
                stockPrices[i] = Math.max(1, stockPrices[i] * (1 + changePercent));
                // 防止數值過度偏離基礎
                if(stockPrices[i] > stockBasePrices[i] * 150) stockPrices[i] *= 0.4;
            }
        }
        document.getElementById('stock-timer').innerText = `${stockCountdown}s`;
        updateUI();
    }, 1000);

    // 🔥 隨機事件：狂暴時刻觸發計時器 (每30秒有20%機率觸發持續8秒)
    setInterval(() => {
        if(!isRageMode) {
            if(Math.random() <= 0.20) {
                isRageMode = true;
                eventBanner.style.display = 'block';
                setTimeout(() => {
                    isRageMode = false;
                    eventBanner.style.display = 'none';
                    updateUI();
                }, 8000);
            }
        }
    }, 3000);

    // 🌳 動態生成50項天賦樹並渲染
    const talentContainer = document.getElementById('talent-container');
    function renderTalents() {
        talentContainer.innerHTML = '';
        talentsData.forEach((t, index) => {
            let item = document.createElement('div');
            let isUnlocked = unlockedTalents.includes(t.id);
            
            // 判定是否可購買 (必須依序購買：前面一個天賦必須已經解鎖，第一個天賦預設可買)
            let isAvailable = false;
            if (index === 0 || unlockedTalents.includes(talentsData[index - 1].id)) {
                isAvailable = true;
            }

            item.className = `talent-item ${isUnlocked ? 'unlocked' : (isAvailable ? '' : 'locked')}`;
            item.innerHTML = `
                <div>
                    <div style="font-weight:bold;">${t.name}</div>
                    <div style="font-size:9px; color:#9ca3af;">${t.desc}</div>
                </div>
            `;

            if(!isUnlocked) {
                let btn = document.createElement('button');
                btn.className = 'talent-btn';
                btn.innerText = `解鎖 (${t.cost})`;
                btn.disabled = (!isAvailable || score < t.cost);
                btn.onclick = () => {
                    if(score >= t.cost) {
                        score -= t.cost;
                        unlockedTalents.push(t.id);
                        renderTalents();
                        updateUI();
                    }
                };
                item.appendChild(btn);
            } else {
                let check = document.createElement('span');
                check.innerText = '✅';
                item.appendChild(check);
            }
            talentContainer.appendChild(item);
        });
    }

    // 交易市場代碼打包與解包
    packBtn.addEventListener('click', () => {
        if (weaponIndex === 1 && enchantId === 0) return;
        let code = btoa(`${weaponIndex},${enchantId}`);
        navigator.clipboard.writeText(code).then(() => {
            alert(`📦 交易碼已複製：${code}`);
            weaponIndex = 1;
            enchantId = 0;
            updateUI();
        });
    });

    unpackBtn.addEventListener('click', () => {
        let code = marketInput.value.trim();
        if(!code) return;
        try {
            let decoded = atob(code);
            let parts = decoded.split(',');
            if(parts.length === 2) {
                weaponIndex = parseInt(parts[0]);
                enchantId = parseInt(parts[1]);
                marketInput.value = "";
                updateUI();
            }
        } catch(err) { alert("❌ 代碼錯誤"); }
    });

    // 福利代碼
    giftBtn.addEventListener('click', () => {
        let code = giftInput.value.trim().toUpperCase();
        if (usedGiftCodes.includes(code)) return;
        if (code === "SWORD10") { weaponIndex = Math.max(weaponIndex, 10); usedGiftCodes.push(code); } 
        else if (code === "LEGEND50") { weaponIndex = 50; enchantId = 50; usedGiftCodes.push(code); }
        giftInput.value = "";
        updateUI();
    });

    // 管理員後台核心執行
    admWBtn.addEventListener('click', () => {
        let lv = parseInt(admWInput.value);
        if(lv >= 1 && lv <= 50) { weaponIndex = lv; updateUI(); }
    });
    admSaveBtn.addEventListener('click', () => {
        if(!isNaN(parseInt(admCoinInput.value))) score = parseInt(admCoinInput.value);
        if(!isNaN(parseInt(admMinerInput.value))) miners = parseInt(admMinerInput.value);
        updateUI();
        alert("🔱 創世數據修改完畢！");
    });
    diyCodeBtn.addEventListener('click', () => {
        let w = parseInt(diyW.value) || 1;
        let e = parseInt(diyE.value) || 0;
        if(w >= 1 && w <= 50 && e >= 0 && e <= 51) {
            let code = btoa(`${w},${e}`);
            navigator.clipboard.writeText(code).then(() => alert(`🎁 已憑空生成武器代碼：${code}`));
        }
    });

    // 啟動
