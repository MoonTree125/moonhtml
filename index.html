<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>不滅神劍：全民市場純淨版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background: #0a0e17; color: #fff; font-family: sans-serif; padding: 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 30px; }
        
        .stat-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 2px solid #38bdf8; border-radius: 16px; padding: 15px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        .coin-title { font-size: 14px; color: #38bdf8; letter-spacing: 2px; }
        .coin-count { font-size: 36px; font-weight: bold; color: #fff; margin: 5px 0; text-shadow: 0 0 12px #38bdf8; font-family: monospace; }
        .weapon-info { font-size: 15px; color: #cbd5e1; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; display: inline-block; margin-top: 5px; }
        
        .click-area { background: radial-gradient(circle, #1e293b 0%, #090d16 100%); border-radius: 24px; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 220px; border: 1px solid #334155; position: relative; overflow: hidden; }
        .svg-sword-container { width: 140px; height: 140px; cursor: pointer; transition: transform 0.05s ease; filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.7)); }
        .svg-sword-container:active { transform: scale(0.88) rotate(-8deg); }
        
        .panel { background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 15px; }
        .panel-title { font-size: 14px; color: #9ca3af; font-weight: 600; margin-bottom: 12px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        button { background: #1f2937; border: none; color: #fff; padding: 12px 8px; border-radius: 10px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; border-bottom: 4px solid rgba(0,0,0,0.3); width: 100%; }
        button:active { transform: translateY(2px); border-bottom-width: 2px; }
        button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        
        .btn-upgrade { background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); }
        .btn-enchant { background: linear-gradient(135deg, #a21caf 0%, #86198f 100%); }
        .btn-miner { background: linear-gradient(135deg, #d97706 0%, #b45309 100%); }
        .btn-wheel { background: linear-gradient(135deg, #059669 0%, #047857 100%); }
        .sm-btn { padding: 8px 16px; font-size: 13px; width: auto; background: #10b981; border-bottom: 2px solid rgba(0,0,0,0.3); }
        
        .desc { font-size: 11px; color: #9ca3af; font-weight: normal; }
        .notice-text { font-size: 12px; color: #f59e0b; background: rgba(245,158,11,0.05); padding: 8px; border-radius: 8px; border-left: 3px solid #f59e0b; margin-top: 8px; line-height: 1.4; }
        
        .input-group { display: flex; gap: 8px; margin-top: 8px; }
        input[type="text"] { flex: 1; background: #030712; border: 1px solid #374151; border-radius: 8px; padding: 10px; color: #fff; font-size: 13px; text-align: center; outline: none; }
        
        .floating-num { position: absolute; font-weight: bold; font-size: 22px; color: #38bdf8; pointer-events: none; animation: floatUp 0.6s ease-out forwards; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-family: monospace; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }
    </style>
</head>
<body>

<div class="container">
    <div class="stat-card">
        <div class="coin-title">GOLDEN COINS</div>
        <div class="coin-count" id="score-display">0</div>
        <div class="weapon-info" id="weapon-display">🗡️ 裝備：破舊鐵劍 (Lv.1)</div>
        <div style="font-size: 12px; color: #a78bfa; margin-top: 4px;" id="enchant-display">✨ 附魔：無</div>
    </div>

    <div class="click-area" id="click-zone">
        <div class="svg-sword-container" id="click-btn">
            <svg viewBox="0 0 100 100" width="100%" height="100%" style="transform: rotate(45deg);">
                <path d="M 45 8 C 45 8, 50 0, 55 8 L 55 65 L 45 65 Z" fill="#e2e8f0" />
                <path d="M 25 65 C 35 60, 65 60, 75 65 L 70 72 L 30 72 Z" fill="#eab308" />
                <rect x="44" y="72" width="12" height="20" rx="3" fill="#292524" />
                <circle cx="50" cy="95" r="2" fill="#67e8f9" />
            </svg>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">⚙️ 武器鍛造、附魔與自動化</div>
        <div class="grid-2">
            <button class="btn-upgrade" id="upgrade-btn">
                <span>⚒️ 手動升級武器</span>
                <span class="desc" id="upgrade-desc">花費 60</span>
            </button>
            <button class="btn-enchant" id="enchant-btn">
                <span>🔥 隨機附魔</span>
                <span class="desc" id="enchant-desc">花費 100</span>
            </button>
            <button class="btn-miner" id="miner-btn">
                <span>⛏️ 僱用礦工</span>
                <span class="desc" id="miner-desc">花費 75</span>
            </button>
            <button class="btn-wheel" id="wheel-btn">
                <span>🎰 幸運大轉盤</span>
                <span class="desc">花費 500</span>
            </button>
        </div>
        <div class="notice-text">💡 轉盤有 1% 機率抽到隱藏第 51 種【全班我最帥】附魔，金幣暴擊 100倍！</div>
    </div>

    <div class="panel">
        <div class="panel-title">🏪 班級武器一對一交易市場</div>
        <button style="background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);" id="pack-btn">📦 打包目前的武器為「交易碼」</button>
        <div class="input-group">
            <input type="text" id="market-input" placeholder="貼上同學給你的武器交易碼">
            <button class="sm-btn" id="unpack-btn">解包引入</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">🎁 官方新手福利代碼</div>
        <div class="input-group">
            <input type="text" id="gift-input" placeholder="輸入官方福利碼">
            <button class="sm-btn" id="gift-btn" style="background:#06b6d4;">領取</button>
        </div>
    </div>
</div>

<script>
    // 終極防快取覆蓋全新金鑰
    const KEY_SCORE = 'v5_pure_score';
    const KEY_W_IDX = 'v5_pure_w_idx';
    const KEY_E_ID  = 'v5_pure_e_id';
    const KEY_MINER = 'v5_pure_miners';
    const KEY_GIFTS = 'v5_pure_gifts';

    let score = parseInt(localStorage.getItem(KEY_SCORE)) || 0;
    let weaponIndex = parseInt(localStorage.getItem(KEY_W_IDX)) || 1;
    let enchantId = parseInt(localStorage.getItem(KEY_E_ID)) || 0;
    let miners = parseInt(localStorage.getItem(KEY_MINER)) || 0;
    let usedGiftCodes = JSON.parse(localStorage.getItem(KEY_GIFTS)) || [];

    const weapons = [];
    const prefix = ["新手", "精鋼", "淬火", "黑曜石", "寒冰", "烈焰", "雷霆", "破空", "聖光", "不滅"];
    const wTypes = ["鐵劍", "長劍", "巨劍", "重劍", "太刀", "戰刃", "靈劍", "神劍"];
    for(let i=1; i<=50; i++) {
        if(i === 1) weapons.push({name: "破舊鐵劍", power: 1});
        else if(i === 50) weapons.push({name: "🌌 宇宙終極不滅真神創世劍", power: 150000});
        else {
            let p = prefix[Math.floor((i/50)*prefix.length)];
            let t = wTypes[Math.floor((i/80)*wTypes.length)];
            weapons.push({name: `${p}之${t} Lv.${i}`, power: Math.floor(Math.pow(i, 2.8) + i * 5)});
        }
    }

    const enchants = [{name: "無", multiply: 1.0, color: "#fff"}];
    while(enchants.length < 51) {
        let id = enchants.length;
        enchants.push({ name: `神聖超頻 Tier ${id}`, multiply: 500 + (id * 150), color: "#c084fc" });
    }
    enchants.push({name: "🌈 全班我最帥", multiply: 100.0, color: "#f472b6"});

    const scoreDisplay = document.getElementById('score-display');
    const weaponDisplay = document.getElementById('weapon-display');
    const enchantDisplay = document.getElementById('enchant-display');
    const clickBtn = document.getElementById('click-btn');
    const upgradeBtn = document.getElementById('upgrade-btn');
    const upgradeDesc = document.getElementById('upgrade-desc');
    const enchantBtn = document.getElementById('enchant-btn');
    const enchantDesc = document.getElementById('enchant-desc');
    const minerBtn = document.getElementById('miner-btn');
    const minerDesc = document.getElementById('miner-desc');
    const wheelBtn = document.getElementById('wheel-btn');
    const packBtn = document.getElementById('pack-btn');
    const marketInput = document.getElementById('market-input');
    const unpackBtn = document.getElementById('unpack-btn');
    const giftInput = document.getElementById('gift-input');
    const giftBtn = document.getElementById('gift-btn');

    function updateUI() {
        scoreDisplay.innerText = Math.floor(score).toLocaleString();
        weaponDisplay.innerText = `🗡️ 裝備：${weapons[weaponIndex - 1].name}`;
        
        let enc = enchants[enchantId];
        enchantDisplay.innerText = `✨ 附魔：${enc.name} (倍率: x${enc.multiply})`;
        enchantDisplay.style.color = enc.color;

        if (weaponIndex < 50) {
            let upgradeCost = weaponIndex * 60;
            upgradeDesc.innerText = `花費 ${upgradeCost}`;
            upgradeBtn.disabled = (score < upgradeCost);
        } else {
            upgradeBtn.innerHTML = "<span>⚡ 滿級 50 ⚡</span>";
            upgradeBtn.disabled = true;
        }

        let enchantCost = weaponIndex * 100;
        enchantDesc.innerText = `花費 ${enchantCost}`;
        enchantBtn.disabled = (score < enchantCost);

        let minerCost = 75 + (miners * 45);
        minerDesc.innerText = `擁有: ${miners} | 花費 ${minerCost}`;
        minerBtn.disabled = (score < minerCost);

        wheelBtn.disabled = (score < 500);

        localStorage.setItem(KEY_SCORE, score);
        localStorage.setItem(KEY_W_IDX, weaponIndex);
        localStorage.setItem(KEY_E_ID, enchantId);
        localStorage.setItem(KEY_MINER, miners);
        localStorage.setItem(KEY_GIFTS, JSON.stringify(usedGiftCodes));
    }

    function handleCoreClick(clientX, clientY) {
        let totalPower = Math.floor(weapons[weaponIndex - 1].power * enchants[enchantId].multiply);
        score += totalPower;

        let num = document.createElement('div');
        num.className = 'floating-num';
        num.innerText = `+${totalPower}`;
        num.style.left = `${clientX - 20}px`;
        num.style.top = `${clientY - 40}px`;
        document.body.appendChild(num);
        setTimeout(() => num.remove(), 600);

        updateUI();
    }

    clickBtn.addEventListener('touchstart', (e) => {
        e.preventDefault(); 
        let touch = e.touches[0];
        handleCoreClick(touch.clientX, touch.clientY);
    });

    clickBtn.addEventListener('click', (e) => {
        if (e.pointerType === 'touch') return;
        handleCoreClick(e.clientX, e.clientY);
    });

    upgradeBtn.addEventListener('click', () => {
        let upgradeCost = weaponIndex * 60;
        if (score >= upgradeCost && weaponIndex < 50) {
            score -= upgradeCost;
            weaponIndex++;
            updateUI();
        }
    });

    enchantBtn.addEventListener('click', () => {
        let enchantCost = weaponIndex * 100;
        if (score >= enchantCost) {
            score -= enchantCost;
            enchantId = Math.floor(Math.random() * 50) + 1;
            updateUI();
        }
    });

    minerBtn.addEventListener('click', () => {
        let minerCost = 75 + (miners * 45);
        if (score >= minerCost) {
            score -= minerCost;
            miners++;
            updateUI();
        }
    });

    setInterval(() => { if (miners > 0) { score += miners; updateUI(); } }, 1000);

    wheelBtn.addEventListener('click', () => {
        if (score >= 500) {
            score -= 500;
            let rng = Math.random();
            if (rng <= 0.01) { enchantId = 51; } 
            else if (rng <= 0.20) { weaponIndex = Math.min(50, weaponIndex + 3); } 
            else { score += 1000; }
            updateUI();
        }
    });

    packBtn.addEventListener('click', () => {
        if (weaponIndex === 1 && enchantId === 0) return;
        let code = btoa(`${weaponIndex},${enchantId}`);
        navigator.clipboard.writeText(code).then(() => {
            alert(`📦 交易碼已複製：${code}`);
            weaponIndex = 1;
            enchantId = 0;
            updateUI();
        });
    });

    unpackBtn.addEventListener('click', () => {
        let code = marketInput.value.trim();
        if(!code) return;
        try {
            let decoded = atob(code);
            let parts = decoded.split(',');
            if(parts.length === 2) {
                weaponIndex = parseInt(parts[0]);
                enchantId = parseInt(parts[1]);
                marketInput.value = "";
                updateUI();
            }
        } catch(err) { alert("❌ 代碼錯誤"); }
    });

    giftBtn.addEventListener('click', () => {
        let code = giftInput.value.trim().toUpperCase();
        if (usedGiftCodes.includes(code)) return;
        if (code === "SWORD10") { weaponIndex = Math.max(weaponIndex, 10); usedGiftCodes.push(code); } 
        else if (code === "LEGEND50") { weaponIndex = 50; enchantId = 50; usedGiftCodes.push(code); }
        giftInput.value = "";
        updateUI();
    });

    updateUI();
</script>
</body>
</html>
